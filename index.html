      els.selectionMeta.innerHTML = `<span>${Math.round(selection.x)}, ${Math.round(selection.y)}</span><span>${Math.round(selection.width)} x ${Math.round(selection.height)} px</span>`;
      renderSpotlightZoomLayer(selection, rect);
    }

    function renderEditorMode() {
      if (!state.editor) {
        return;
      }

      const isCrop = state.editor.mode === "crop";
      els.cropModeButton.classList.toggle("is-active", isCrop);
      els.spotlightModeButton.classList.toggle("is-active", !isCrop);
      els.cropControls.hidden = !isCrop;
      els.spotlightControls.hidden = isCrop;
      els.spotlightNote.hidden = isCrop;
      els.applyCropButton.hidden = !isCrop;
      els.applySpotlightButton.hidden = isCrop;
      els.cropRadiusRange.value = Math.round(state.editor.cropRadius);
      els.cropRadiusValue.textContent = `${Math.round(state.editor.cropRadius)}px`;
      els.maskRange.value = Math.round(state.editor.mask * 100);
      els.maskValue.textContent = `${Math.round(state.editor.mask * 100)}%`;
      els.spotlightRadiusRange.value = Math.round(state.editor.spotlightRadius);
      els.spotlightRadiusValue.textContent = `${Math.round(state.editor.spotlightRadius)}px`;
      els.spotlightZoomRange.value = Math.round(state.editor.spotlightZoom * 100);
      els.spotlightZoomValue.textContent = `${Math.round(state.editor.spotlightZoom * 100)}%`;
      renderEditorSelection();
    }

    function resetSpotlightZoom() {
      if (!state.editor) {
        return;
      }

      state.editor.spotlightZoom = 1;
      state.editor.zoomX = null;
      state.editor.zoomY = null;
      state.editor.zoomMoved = false;
      els.spotlightZoomLayer.hidden = true;
      els.spotlightZoomLayer.classList.remove("is-dragging");
    }

    function setEditorMode(mode) {
      if (!state.editor) {
        return;
      }

      state.editor.mode = mode;
      state.editor.selectionVisible = true;
      resetSpotlightZoom();
      renderEditorMode();
    }

    function openImageEditor(imageId) {
      const image = getImageById(imageId);
      if (!image) {
        return;
      }

      clearGuides();
      selectImage(image.id);
      state.editor = {
        imageId: image.id,
        mode: "crop",
        mask: Number(els.maskRange.value) / 100,
        cropRadius: Number(els.cropRadiusRange.value),
        spotlightRadius: Number(els.spotlightRadiusRange.value),
        spotlightZoom: 1,
        zoomX: null,
        zoomY: null,
        zoomMoved: false,
        selectionVisible: true,
        selection: getDefaultEditorSelection(image)
      };

      els.editorImage.alt = image.name;
      els.editorImage.src = image.url;
      els.editorMeta.textContent = "";
      els.imageEditor.hidden = false;
      renderEditorMode();
      requestAnimationFrame(renderEditorSelection);
    }

    function closeImageEditor() {
      state.editor = null;
      state.editorDrag = null;
      els.imageEditor.hidden = true;
      els.editorMask.hidden = true;
      els.editorSelection.hidden = false;
      els.spotlightZoomLayer.hidden = true;
      els.spotlightZoomLayer.classList.remove("is-dragging");
      els.editorImage.removeAttribute("src");
    }

    function resetEditorSelection() {
      const image = getEditorImage();
      if (!state.editor || !image) {
        return;
      }

      state.editor.selection = getDefaultEditorSelection(image);
      state.editor.selectionVisible = true;
      state.editor.zoomX = null;
      state.editor.zoomY = null;
      state.editor.zoomMoved = false;
      renderEditorSelection();
    }

    function getEditorNaturalPoint(event) {
      const image = getEditorImage();
      const rect = getEditorImageRect();
      if (!image || !rect) {
        return { x: 0, y: 0 };
      }

      return {
        x: clamp((event.clientX - els.editorStage.getBoundingClientRect().left - rect.left) / rect.scaleX, 0, image.naturalWidth),
        y: clamp((event.clientY - els.editorStage.getBoundingClientRect().top - rect.top) / rect.scaleY, 0, image.naturalHeight)
      };
    }

    function startEditorSelectionMove(event) {
      if (!state.editor || !isEditorSelectionVisible() || event.target.closest(".editor-selection-handle")) {
        return;
      }

      event.preventDefault();
      event.stopPropagation();
      els.editorSelection.setPointerCapture(event.pointerId);
      state.editorDrag = {
        type: "move",
        pointerId: event.pointerId,
        startPoint: getEditorNaturalPoint(event),
        startSelection: { ...state.editor.selection }
      };
    }

    function startEditorSelectionResize(event) {
      if (!state.editor || !isEditorSelectionVisible()) {
        return;
      }

      const handle = event.currentTarget;
      const corner = handle.dataset.corner;
      const sign = getSign(corner);
      const selection = state.editor.selection;
      const anchorX = sign.x > 0 ? selection.x : selection.x + selection.width;
      const anchorY = sign.y > 0 ? selection.y : selection.y + selection.height;

      event.preventDefault();
      event.stopPropagation();
      handle.setPointerCapture(event.pointerId);
      state.editorDrag = {
        type: "resize",
        pointerId: event.pointerId,
        corner,
        sign,
        anchorX,
        anchorY,
        startSelection: { ...selection }
      };
    }

    function startSpotlightZoomMove(event) {
      if (!state.editor || state.editor.mode !== "spotlight" || state.editor.spotlightZoom <= 1) {
        return;
      }

      const selection = clampEditorSelection(state.editor.selection);
      const zoomRect = ensureSpotlightZoomPosition(selection);
      if (!zoomRect) {
        return;
      }

      event.preventDefault();
      event.stopPropagation();
      els.spotlightZoomLayer.setPointerCapture(event.pointerId);
      els.spotlightZoomLayer.classList.add("is-dragging");
      state.editor.zoomMoved = true;
      state.editorDrag = {
        type: "zoom",
        pointerId: event.pointerId,
        startPoint: getEditorNaturalPoint(event),
        startZoom: {
          x: zoomRect.x,
          y: zoomRect.y
        }
      };
    }

    function handleEditorStageDoubleClick(event) {
      if (!state.editor || state.editor.mode !== "spotlight" || isEditorSelectionVisible()) {
        return;
      }
      if (event.target.closest?.("#spotlightZoomLayer")) {
        return;
      }

      event.preventDefault();
      event.stopPropagation();
      showSpotlightSelection();
    }

    function moveEditorSelection(point) {
      const image = getEditorImage();
      const drag = state.editorDrag;
      if (!image || !drag) {
        return;
      }

      if (drag.type === "zoom") {
        const selection = clampEditorSelection(state.editor.selection);
        const size = getSpotlightZoomSize(selection);
        state.editor.zoomX = clampZoomCoordinate(drag.startZoom.x + point.x - drag.startPoint.x, size.width, image.naturalWidth);
        state.editor.zoomY = clampZoomCoordinate(drag.startZoom.y + point.y - drag.startPoint.y, size.height, image.naturalHeight);
      } else if (drag.type === "move") {
        const deltaX = point.x - drag.startPoint.x;
        const deltaY = point.y - drag.startPoint.y;
        state.editor.selection = clampEditorSelection({
          ...drag.startSelection,
          x: drag.startSelection.x + deltaX,
          y: drag.startSelection.y + deltaY
        });
      } else {
        const minSize = Math.max(12, Math.min(image.naturalWidth, image.naturalHeight) * 0.04);
        const rawX = drag.sign.x > 0 ? point.x : drag.anchorX - Math.max(minSize, drag.anchorX - point.x);
        const rawY = drag.sign.y > 0 ? point.y : drag.anchorY - Math.max(minSize, drag.anchorY - point.y);
        const rawWidth = drag.sign.x > 0 ? point.x - drag.anchorX : drag.anchorX - rawX;
        const rawHeight = drag.sign.y > 0 ? point.y - drag.anchorY : drag.anchorY - rawY;
        const next = {
          x: drag.sign.x > 0 ? drag.anchorX : rawX,
          y: drag.sign.y > 0 ? drag.anchorY : rawY,
          width: Math.max(minSize, Math.abs(rawWidth)),
          height: Math.max(minSize, Math.abs(rawHeight))
        };
        state.editor.selection = clampEditorSelection(next);
      }

      renderEditorSelection();
    }

    function continueEditorInteraction(event) {
      if (!state.editorDrag || event.pointerId !== state.editorDrag.pointerId) {
        return;
      }

      event.preventDefault();
      moveEditorSelection(getEditorNaturalPoint(event));
    }

    function endEditorInteraction(event) {
      if (!state.editorDrag || event.pointerId !== state.editorDrag.pointerId) {
        return;
      }

      let handle = els.editorSelection;
      if (state.editorDrag.type === "resize") {
        handle = els.editorSelection.querySelector(`[data-corner="${state.editorDrag.corner}"]`);
      } else if (state.editorDrag.type === "zoom") {
        handle = els.spotlightZoomLayer;
      }
      if (handle?.hasPointerCapture?.(event.pointerId)) {
        handle.releasePointerCapture(event.pointerId);
      }
      els.spotlightZoomLayer.classList.remove("is-dragging");
      state.editorDrag = null;
    }

    function loadCanvasImage(url) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = url;
      });
    }

    function canvasToBlob(canvas) {
      return new Promise((resolve) => {
        canvas.toBlob((blob) => resolve(blob), "image/png");
      });
    }

    function getCanvasExportScale() {
      const preferredScale = 3;
      const maxExportDimension = 12000;
      const maxDimension = Math.max(state.width, state.height);
      return Math.max(1, Math.min(preferredScale, maxExportDimension / maxDimension));
    }

    function drawExportArrow(context, points) {
      if (points.length < 2) {
        return;
      }

      const end = points[points.length - 1];
      const previous = points[points.length - 2];
      const angle = Math.atan2(end.y - previous.y, end.x - previous.x);
      const arrowLength = 9;
      const arrowSpread = 0.68;

      context.beginPath();
      context.moveTo(end.x, end.y);
      context.lineTo(
        end.x - Math.cos(angle - arrowSpread) * arrowLength,
        end.y - Math.sin(angle - arrowSpread) * arrowLength
      );
      context.moveTo(end.x, end.y);
      context.lineTo(
        end.x - Math.cos(angle + arrowSpread) * arrowLength,
        end.y - Math.sin(angle + arrowSpread) * arrowLength
      );
      context.stroke();
    }

    function drawExportConnector(context, connector) {
      const points = getConnectorPoints(connector);
      if (points.length < 2) {
        return;
      }

      context.save();
      context.strokeStyle = "#FE2C55";
      context.lineWidth = 2.4;
      context.lineCap = "round";
      context.lineJoin = "round";
      context.stroke(new Path2D(getConnectorPath(points)));
      drawExportArrow(context, points);
      context.restore();
    }

    async function renderCanvasExport() {
      const exportScale = getCanvasExportScale();
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.round(state.width * exportScale));
      canvas.height = Math.max(1, Math.round(state.height * exportScale));
      const context = canvas.getContext("2d");
      context.imageSmoothingEnabled = true;
      context.imageSmoothingQuality = "high";
      context.scale(exportScale, exportScale);

      context.fillStyle = getCanvasBackgroundColor();
      context.fillRect(0, 0, state.width, state.height);

      const orderedImages = [...state.images].sort((first, second) => first.z - second.z);
      for (const image of orderedImages) {
        const source = await loadCanvasImage(image.url);
        context.drawImage(source, image.x, image.y, image.width, image.height);
      }

      state.connectors.forEach((connector) => drawExportConnector(context, connector));
      return canvas;
    }

    async function getCanvasExportBlob() {
      const canvas = await renderCanvasExport();
      const blob = await canvasToBlob(canvas);
      if (!blob) {
        throw new Error("PNG export failed.");
      }
      return blob;
    }

    function setTemporaryButtonLabel(button, label) {
      const originalLabel = button.dataset.defaultLabel || button.textContent;
      button.dataset.defaultLabel = originalLabel;
      button.textContent = label;
      window.setTimeout(() => {
        button.textContent = button.dataset.defaultLabel || originalLabel;
      }, 1400);
    }

    async function downloadCanvasPng() {
      els.downloadCanvasButton.disabled = true;
      try {
        const blob = await getCanvasExportBlob();
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = `canvas-export-${Date.now()}.png`;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        window.setTimeout(() => URL.revokeObjectURL(url), 0);
        setTemporaryButtonLabel(els.downloadCanvasButton, "Done");
      } catch (error) {
        console.error(error);
        setTemporaryButtonLabel(els.downloadCanvasButton, "Failed");
      } finally {
        els.downloadCanvasButton.disabled = false;
      }
    }

    async function copyCanvasPng() {
      els.copyCanvasButton.disabled = true;
      try {
        if (!navigator.clipboard?.write || typeof ClipboardItem === "undefined") {
          throw new Error("PNG clipboard copy is not supported in this browser.");
        }
        const blob = await getCanvasExportBlob();
        await navigator.clipboard.write([
          new ClipboardItem({
            "image/png": blob
          })
        ]);
        setTemporaryButtonLabel(els.copyCanvasButton, "Copied");
      } catch (error) {
        console.error(error);
        setTemporaryButtonLabel(els.copyCanvasButton, "Failed");
      } finally {
        els.copyCanvasButton.disabled = false;
      }
    }

    async function replaceImageAsset(image, canvas, options = {}) {
      const blob = await canvasToBlob(canvas);
      if (!blob) {
        return;
      }

      pushUndoSnapshot(options.undoSnapshot || createUndoSnapshot());
      const nextUrl = URL.createObjectURL(blob);
      const previousWidth = image.width;
      image.url = nextUrl;
      image.naturalWidth = canvas.width;
      image.naturalHeight = canvas.height;
      image.aspect = canvas.width / canvas.height;

      if (options.updateDisplaySize) {
        image.width = Math.max(28, previousWidth);
        image.height = image.width / image.aspect;
        clampImagePosition(image);
      }

      const elementImage = els.imageLayer.querySelector(`[data-image-id="${image.id}"] img`);
      if (elementImage) {
        elementImage.src = nextUrl;
      }
      syncImageElement(image);
      renderGroupSelection();
      renderConnectors();
      closeImageEditor();
    }

    function getRoundedEditorSelection() {
      const image = getEditorImage();
      if (!state.editor || !image) {
        return null;
      }

      const selection = clampEditorSelection(state.editor.selection);
      const x = Math.round(selection.x);
      const y = Math.round(selection.y);
      const width = Math.max(1, Math.min(image.naturalWidth - x, Math.round(selection.width)));
      const height = Math.max(1, Math.min(image.naturalHeight - y, Math.round(selection.height)));
      return { x, y, width, height };
    }

    function addRoundedRectPath(context, x, y, width, height, radius) {
      const safeRadius = clamp(radius, 0, Math.min(width, height) / 2);
      context.beginPath();
      context.moveTo(x + safeRadius, y);
      context.lineTo(x + width - safeRadius, y);
      context.arcTo(x + width, y, x + width, y + safeRadius, safeRadius);
      context.lineTo(x + width, y + height - safeRadius);
      context.arcTo(x + width, y + height, x + width - safeRadius, y + height, safeRadius);
      context.lineTo(x + safeRadius, y + height);
      context.arcTo(x, y + height, x, y + height - safeRadius, safeRadius);
      context.lineTo(x, y + safeRadius);
      context.arcTo(x, y, x + safeRadius, y, safeRadius);
      context.closePath();
    }

    async function applyCrop() {
      const image = getEditorImage();
      const selection = getRoundedEditorSelection();
      if (!image || !selection) {
        return;
      }

      const undoSnapshot = createUndoSnapshot();
      const source = await loadCanvasImage(image.url);
      const canvas = document.createElement("canvas");
      canvas.width = selection.width;
      canvas.height = selection.height;
      const context = canvas.getContext("2d");
      const radius = Math.min(state.editor?.cropRadius || 0, selection.width / 2, selection.height / 2);
      if (radius > 0) {
        addRoundedRectPath(context, 0, 0, selection.width, selection.height, radius);
        context.clip();
      }
      context.drawImage(source, selection.x, selection.y, selection.width, selection.height, 0, 0, selection.width, selection.height);
      await replaceImageAsset(image, canvas, { updateDisplaySize: true, undoSnapshot });
    }

    async function applySpotlight() {
      const image = getEditorImage();
      const selection = getRoundedEditorSelection();
      if (!image || !selection || !state.editor) {
        return;
      }

      const undoSnapshot = createUndoSnapshot();
      const source = await loadCanvasImage(image.url);
      const canvas = document.createElement("canvas");
      canvas.width = image.naturalWidth;
      canvas.height = image.naturalHeight;
      const context = canvas.getContext("2d");
      context.drawImage(source, 0, 0, canvas.width, canvas.height);
      context.fillStyle = `rgba(0, 0, 0, ${state.editor.mask})`;
      context.fillRect(0, 0, canvas.width, canvas.height);
      if (isEditorSelectionVisible()) {
        context.save();
        addRoundedRectPath(context, selection.x, selection.y, selection.width, selection.height, state.editor.spotlightRadius);
        context.clip();
        context.drawImage(source, 0, 0, canvas.width, canvas.height);
        context.restore();
      }

      const zoomRect = getSpotlightZoomRect(selection);
      if (zoomRect) {
        context.save();
        addRoundedRectPath(context, zoomRect.x, zoomRect.y, zoomRect.width, zoomRect.height, state.editor.spotlightRadius * zoomRect.scale);
        context.clip();
        context.drawImage(
          source,
          selection.x,
          selection.y,
          selection.width,
          selection.height,
          zoomRect.x,
          zoomRect.y,
          zoomRect.width,
          zoomRect.height
        );
        context.restore();
      }
      await replaceImageAsset(image, canvas, { undoSnapshot });
    }

    function getCanvasFrame() {
      return {
        left: state.x,
        top: state.y,
        right: state.x + state.width,
        bottom: state.y + state.height,
        width: state.width,
        height: state.height
      };
    }

    function frameFromEdges(edges) {
      return {
        left: edges.left,
        top: edges.top,
        right: edges.right,
        bottom: edges.bottom,
        width: edges.right - edges.left,
        height: edges.bottom - edges.top
      };
    }

    function constrainResizeFrame(edges, drag) {
      const limits = getCanvasViewportLimits();
      let { left, top, right, bottom } = edges;

      if (drag.sign.x > 0) {
        right = clamp(right, left + state.minWidth, left + limits.maxWidth);
      } else {
        left = clamp(left, right - limits.maxWidth, right - state.minWidth);
      }

      if (drag.sign.y > 0) {
        bottom = clamp(bottom, top + state.minHeight, top + limits.maxHeight);
      } else {
        top = clamp(top, bottom - limits.maxHeight, bottom - state.minHeight);
      }

      return { left, top, right, bottom };
    }

    function getCanvasResizeTargets(drag) {
      const xTargets = [];
      const yTargets = [];

      drag.startImages.forEach((image) => {
        const left = drag.startLeft + image.x;
        const right = left + image.width;
        const top = drag.startTop + image.y;
        const bottom = top + image.height;

        xTargets.push(
          { value: left, kind: "size" },
          { value: right, kind: "size" }
        );
        yTargets.push(
          { value: top, kind: "size" },
          { value: bottom, kind: "size" }
        );
      });

      return { xTargets, yTargets };
    }

    function snapCanvasResizeFrame(edges, drag) {
      const targets = getCanvasResizeTargets(drag);
      const snaps = [];
      const next = { ...edges };

      if (drag.sign.x > 0) {
        const xSnap = findBestSnap([next.right], targets.xTargets);
        if (xSnap) {
          next.right += xSnap.delta;
          snaps.push({ axis: "x", edge: "right", value: xSnap.value, kind: xSnap.kind });
        }
      } else {
        const xSnap = findBestSnap([next.left], targets.xTargets);
        if (xSnap) {
          next.left += xSnap.delta;
          snaps.push({ axis: "x", edge: "left", value: xSnap.value, kind: xSnap.kind });
        }
      }

      if (drag.sign.y > 0) {
        const ySnap = findBestSnap([next.bottom], targets.yTargets);
        if (ySnap) {
          next.bottom += ySnap.delta;
          snaps.push({ axis: "y", edge: "bottom", value: ySnap.value, kind: ySnap.kind });
        }
      } else {
        const ySnap = findBestSnap([next.top], targets.yTargets);
        if (ySnap) {
          next.top += ySnap.delta;
          snaps.push({ axis: "y", edge: "top", value: ySnap.value, kind: ySnap.kind });
        }
      }

      return { edges: next, snaps };
    }

    function getCanvasResizeGuides(snaps, frame) {
      return snaps
        .filter((snap) => {
          if (snap.axis === "x") {
            const edgeValue = snap.edge === "left" ? frame.left : frame.right;
            return Math.abs(edgeValue - snap.value) < 0.5;
          }

          const edgeValue = snap.edge === "top" ? frame.top : frame.bottom;
          return Math.abs(edgeValue - snap.value) < 0.5;
        })
        .map((snap) => ({
          axis: snap.axis,
          value: snap.axis === "x" ? snap.value - frame.left : snap.value - frame.top,
          kind: snap.kind
        }))
        .filter((guide) => {
          if (guide.axis === "x") {
            return guide.value >= 0 && guide.value <= frame.width;
          }
          return guide.value >= 0 && guide.value <= frame.height;
        });
    }

    function syncImagesToCanvasFrame(frame, drag) {
      drag.startImages.forEach((startImage) => {
        const image = getImageById(startImage.id);
        if (!image) {
          return;
        }

        image.x = drag.startLeft + startImage.x - frame.left;
        image.y = drag.startTop + startImage.y - frame.top;
        syncImageElement(image);
      });
    }

    function applyCanvasFrame(frame, drag) {
      state.x = frame.left;
      state.y = frame.top;
      state.width = frame.width;
      state.height = frame.height;

      if (drag?.startImages) {
        syncImagesToCanvasFrame(frame, drag);
      }

      renderCanvas();
    }

    function startResize(event) {
      if (state.canvasDrag || state.imageDrag) {
        return;
      }

      const handle = event.currentTarget;

      event.preventDefault();
      handle.setPointerCapture(event.pointerId);
      els.shell.classList.add("is-resizing");
      state.canvasDrag = {
        type: "resize",
        pointerId: event.pointerId,
        undoSnapshot: createUndoSnapshot(),
        hasChanged: false,
        startY: event.clientY,
        startHeight: state.height
      };
    }

    function moveResize(event) {
      if (!state.canvasDrag || state.canvasDrag.type !== "resize" || event.pointerId !== state.canvasDrag.pointerId) {
        return;
      }

      event.preventDefault();
      const drag = state.canvasDrag;
      const deltaY = event.clientY - drag.startY;
      const rawHeight = drag.startHeight + deltaY;
      const yTargets = [];
      state.images.forEach((image) => {
        yTargets.push(
          { value: image.y, kind: "size" },
          { value: image.y + image.height, kind: "size" }
        );
      });

      let nextHeight = clamp(rawHeight, state.minHeight, state.maxHeight);
      const ySnap = findBestSnap([nextHeight], yTargets);
      if (ySnap) {
        nextHeight = clamp(nextHeight + ySnap.delta, state.minHeight, state.maxHeight);
      }

      state.height = nextHeight;
      drag.hasChanged = true;
      renderCanvas();
      renderGuides(ySnap ? [{ axis: "y", value: ySnap.value, kind: ySnap.kind }] : []);
    }

    function endResize(event) {
      if (!state.canvasDrag || state.canvasDrag.type !== "resize" || event.pointerId !== state.canvasDrag.pointerId) {
        return;
      }

      const handle = document.querySelector(".resize-handle");
      if (handle && handle.hasPointerCapture(event.pointerId)) {
        handle.releasePointerCapture(event.pointerId);
      }

      const drag = state.canvasDrag;
      state.canvasDrag = null;
      els.shell.classList.remove("is-resizing");
      clearGuides();
      if (drag.hasChanged) {
        commitUndoSnapshot(drag.undoSnapshot);
      }
      renderCanvas();
    }

    function isMultiSelectEvent(event) {
      return state.modifierSelect || event.shiftKey || event.metaKey || event.ctrlKey;
    }

    function getImagesBounds(images) {
      if (!images.length) {
        return null;
      }

      const left = Math.min(...images.map((image) => image.x));
      const top = Math.min(...images.map((image) => image.y));
      const right = Math.max(...images.map((image) => image.x + image.width));
      const bottom = Math.max(...images.map((image) => image.y + image.height));
      return {
        x: left,
        y: top,
        width: right - left,
        height: bottom - top
      };
    }

    function clampGroupDelta(bounds) {
      let deltaX = 0;
      let deltaY = 0;

      if (bounds.width <= state.width) {
        if (bounds.x < 0) deltaX = -bounds.x;
        if (bounds.x + bounds.width > state.width) deltaX = state.width - bounds.width - bounds.x;
      }
      if (bounds.height <= state.height) {
        if (bounds.y < 0) deltaY = -bounds.y;
        if (bounds.y + bounds.height > state.height) deltaY = state.height - bounds.height - bounds.y;
      }

      return { deltaX, deltaY };
    }

    function startImageMove(event) {
      if (event.target.closest(".image-resize-handle")) {
        return;
      }

      const element = event.currentTarget;
      const imageId = Number(element.dataset.imageId);
      const image = getImageById(imageId);
      if (!image) {
        return;
      }

      if (state.tool === "connect") {
        handleConnectorSurfacePointerDown(event);
        return;
      }

      const undoSnapshot = createUndoSnapshot();
      event.preventDefault();
      event.stopPropagation();
      if (isMultiSelectEvent(event)) {
        toggleImageSelection(image.id);
        return;
      }

      if (!isImageSelected(image.id)) {
        selectImage(image.id);
      } else {
        bringImagesToFront(getSelectedIds());
        renderSelectionState();
      }

      element.setPointerCapture(event.pointerId);
      const selectedIds = getSelectedIds();
      const startImages = selectedIds
        .map(getImageById)
        .filter(Boolean)
        .map((selectedImage) => ({ ...selectedImage }));
      state.imageDrag = {
        pointerId: event.pointerId,
        type: "move",
        imageId: image.id,
        selectedIds,
        undoSnapshot,
        hasChanged: false,
        startPoint: getCanvasPoint(event),
        startImage: { ...image },
        startImages,
        startBounds: getImagesBounds(startImages)
      };
      renderSelectionState();
    }

    function startImageResize(event) {
      if (state.tool === "connect") {
        return;
      }

      const handle = event.currentTarget;
      const element = handle.closest(".canvas-image");
      const imageId = Number(element.dataset.imageId);
      const image = getImageById(imageId);
      if (!image) {
        return;
      }

      const corner = handle.dataset.corner;
      const sign = getSign(corner);
      const anchorX = sign.x > 0 ? image.x : image.x + image.width;
      const anchorY = sign.y > 0 ? image.y : image.y + image.height;

      const undoSnapshot = createUndoSnapshot();
      event.preventDefault();
      event.stopPropagation();
      selectImage(image.id);
      handle.setPointerCapture(event.pointerId);
      state.imageDrag = {
        pointerId: event.pointerId,
        type: "resize",
        imageId: image.id,
        corner,
        sign,
        undoSnapshot,
        hasChanged: false,
        anchorX,
        anchorY,
        startImage: { ...image }
      };
      syncImageElement(image);
    }

    function startGroupResize(event) {
      if (state.tool === "connect") {
        return;
      }

      const selectedIds = getSelectedIds();
      if (selectedIds.length < 2) {
        return;
      }

      const startImages = selectedIds
        .map(getImageById)
        .filter(Boolean)
        .map((image) => ({ ...image }));
      const startBounds = getImagesBounds(startImages);
      if (!startBounds) {
        return;
      }

      const undoSnapshot = createUndoSnapshot();
      const handle = event.currentTarget;
      const corner = handle.dataset.corner;
      const sign = getSign(corner);
      const anchorX = sign.x > 0 ? startBounds.x : startBounds.x + startBounds.width;
      const anchorY = sign.y > 0 ? startBounds.y : startBounds.y + startBounds.height;

      event.preventDefault();
      event.stopPropagation();
      handle.setPointerCapture(event.pointerId);
      bringImagesToFront(selectedIds);
      state.imageDrag = {
        pointerId: event.pointerId,
        type: "group-resize",
        selectedIds,
        corner,
        sign,
        undoSnapshot,
        hasChanged: false,
        anchorX,
        anchorY,
        startBounds,
        startImages
      };
      renderSelectionState();
    }

    function moveImage(point) {
      const drag = state.imageDrag;
      const selectedIds = drag.selectedIds || [drag.imageId];
      const startImages = drag.startImages || [drag.startImage];
      const selectedImages = selectedIds.map(getImageById).filter(Boolean);
      if (!selectedImages.length) {
        return;
      }

      const deltaX = point.x - drag.startPoint.x;
      const deltaY = point.y - drag.startPoint.y;
      const proposedBounds = {
        x: drag.startBounds.x + deltaX,
        y: drag.startBounds.y + deltaY,
        width: drag.startBounds.width,
        height: drag.startBounds.height
      };
      const snapped = snapRectPosition({ ...proposedBounds }, selectedIds);
      const edgeClamp = clampGroupDelta(snapped.rect);
      const finalDeltaX = deltaX + (snapped.rect.x - proposedBounds.x) + edgeClamp.deltaX;
      const finalDeltaY = deltaY + (snapped.rect.y - proposedBounds.y) + edgeClamp.deltaY;
      drag.hasChanged = true;

      startImages.forEach((startImage) => {
        const image = getImageById(startImage.id);
        if (!image) {
          return;
        }
        image.x = startImage.x + finalDeltaX;
        image.y = startImage.y + finalDeltaY;
        syncImageElement(image);
      });
      renderGroupSelection();
      renderConnectors();
      renderGuides(snapped.guides);
    }

    function snapImageScale(scale, drag, minScale, maxScale) {
      const currentWidth = drag.startImage.width * scale;
      const currentHeight = drag.startImage.height * scale;
      let best = null;

      getOtherImages(drag.imageId).forEach((otherImage) => {
        const widthScale = otherImage.width / drag.startImage.width;
        const widthDistance = Math.abs(currentWidth - otherImage.width);
        if (widthScale >= minScale && widthScale <= maxScale && widthDistance <= snapThreshold) {
          best = !best || widthDistance < best.distance
            ? { scale: widthScale, distance: widthDistance, snap: "width" }
            : best;
        }

        const heightScale = otherImage.height / drag.startImage.height;
        const heightDistance = Math.abs(currentHeight - otherImage.height);
        if (heightScale >= minScale && heightScale <= maxScale && heightDistance <= snapThreshold) {
          best = !best || heightDistance < best.distance
            ? { scale: heightScale, distance: heightDistance, snap: "height" }
            : best;
        }
      });

      return best || { scale, snap: null };
    }

    function getSizeGuides(rect, snapKind) {
      if (snapKind === "width") {
        return [
          { axis: "x", value: rect.x, kind: "size" },
          { axis: "x", value: rect.x + rect.width, kind: "size" }
        ];
      }
      if (snapKind === "height") {
        return [
          { axis: "y", value: rect.y, kind: "size" },
          { axis: "y", value: rect.y + rect.height, kind: "size" }
        ];
      }
      return [];
    }

    function snapGroupScale(scale, drag, minScale, maxScale) {
      const currentWidth = drag.startBounds.width * scale;
      const currentHeight = drag.startBounds.height * scale;
      let best = null;

      getOtherImages(drag.selectedIds).forEach((otherImage) => {
        const widthScale = otherImage.width / drag.startBounds.width;
        const widthDistance = Math.abs(currentWidth - otherImage.width);
        if (widthScale >= minScale && widthScale <= maxScale && widthDistance <= snapThreshold) {
          best = !best || widthDistance < best.distance
            ? { scale: widthScale, distance: widthDistance, snap: "width" }
            : best;
        }

        const heightScale = otherImage.height / drag.startBounds.height;
        const heightDistance = Math.abs(currentHeight - otherImage.height);
        if (heightScale >= minScale && heightScale <= maxScale && heightDistance <= snapThreshold) {
          best = !best || heightDistance < best.distance
            ? { scale: heightScale, distance: heightDistance, snap: "height" }
            : best;
        }
      });

      return best || { scale, snap: null };
    }

    function resizeGroup(point) {
      const drag = state.imageDrag;
      const minScale = Math.max(
        0.08,
        ...drag.startImages.map((image) => Math.max(28 / image.width, 28 / image.height))
      );
      const maxWidth = drag.sign.x > 0 ? state.width - drag.anchorX : drag.anchorX;
      const maxHeight = drag.sign.y > 0 ? state.height - drag.anchorY : drag.anchorY;
      const maxScale = Math.max(minScale, Math.min(maxWidth / drag.startBounds.width, maxHeight / drag.startBounds.height));
      const rawWidth = drag.sign.x > 0 ? point.x - drag.anchorX : drag.anchorX - point.x;
      const rawHeight = drag.sign.y > 0 ? point.y - drag.anchorY : drag.anchorY - point.y;
      const desiredScale = Math.max(rawWidth / drag.startBounds.width, rawHeight / drag.startBounds.height);
      const baseScale = clamp(desiredScale, minScale, maxScale);
      const snapped = snapGroupScale(baseScale, drag, minScale, maxScale);
      const scale = snapped.scale;
      drag.hasChanged = true;

      drag.startImages.forEach((startImage) => {
        const image = getImageById(startImage.id);
        if (!image) {
          return;
        }

        image.x = drag.anchorX + (startImage.x - drag.anchorX) * scale;
        image.y = drag.anchorY + (startImage.y - drag.anchorY) * scale;
        image.width = startImage.width * scale;
        image.height = startImage.height * scale;
        syncImageElement(image);
      });

      renderGroupSelection();
      renderConnectors();
      const bounds = getSelectionBounds(drag.selectedIds);
      renderGuides(getSizeGuides(bounds, snapped.snap));
    }

    function resizeImage(point) {
      const drag = state.imageDrag;
      const image = getImageById(drag.imageId);
      if (!image) {
        return;
      }

      const minSize = 28;
      const maxWidth = drag.sign.x > 0 ? state.width - drag.anchorX : drag.anchorX;
      const maxHeight = drag.sign.y > 0 ? state.height - drag.anchorY : drag.anchorY;
      const minScale = Math.max(minSize / drag.startImage.width, minSize / drag.startImage.height);
      const maxScale = Math.max(minScale, Math.min(maxWidth / drag.startImage.width, maxHeight / drag.startImage.height));
      const rawWidth = drag.sign.x > 0 ? point.x - drag.anchorX : drag.anchorX - point.x;
      const rawHeight = drag.sign.y > 0 ? point.y - drag.anchorY : drag.anchorY - point.y;
      const desiredScale = Math.max(rawWidth / drag.startImage.width, rawHeight / drag.startImage.height);
      const baseScale = clamp(desiredScale, minScale, maxScale);
      const snapped = snapImageScale(baseScale, drag, minScale, maxScale);
      const scale = snapped.scale;
      drag.hasChanged = true;

      image.width = drag.startImage.width * scale;
      image.height = drag.startImage.height * scale;
      image.x = drag.sign.x > 0 ? drag.anchorX : drag.anchorX - image.width;
      image.y = drag.sign.y > 0 ? drag.anchorY : drag.anchorY - image.height;
      clampImagePosition(image);
      syncImageElement(image);
      renderConnectors();
      renderGuides(getSizeGuides(image, snapped.snap));
    }

    function continueImageInteraction(event) {
      if (!state.imageDrag || event.pointerId !== state.imageDrag.pointerId) {
        return;
      }

      event.preventDefault();
      const point = getCanvasPoint(event);
      if (state.imageDrag.type === "move") {
        moveImage(point);
      } else if (state.imageDrag.type === "group-resize") {
        resizeGroup(point);
      } else {
        resizeImage(point);
      }
    }

    function endImageInteraction(event) {
      if (!state.imageDrag || event.pointerId !== state.imageDrag.pointerId) {
        return;
      }

      const drag = state.imageDrag;
      const image = getImageById(drag.imageId);
      state.imageDrag = null;
      if (image) {
        syncImageElement(image);
      }
      renderConnectors();
      clearGuides();
      if (drag.hasChanged) {
        commitUndoSnapshot(drag.undoSnapshot);
      }
    }

    function shouldUseNativeUndo(event) {
      const target = event.target;
      if (!target?.matches) {
        return false;
      }

      if (target.matches("textarea, [contenteditable='true']")) {
        return true;
      }

      if (!target.matches("input")) {
        return false;
      }

      return !["button", "checkbox", "file", "radio", "range"].includes(target.type);
    }

    function isUndoKeyboardEvent(event) {
      return (event.metaKey || event.ctrlKey) && !event.shiftKey && event.key.toLowerCase() === "z";
    }

    function handleKeyDown(event) {
      const target = event.target;
      const isEditable = target?.matches?.("input, textarea, select, [contenteditable='true']");

      if (isUndoKeyboardEvent(event) && !shouldUseNativeUndo(event)) {
        event.preventDefault();
        undoLastAction();
        return;
      }

      if (state.editor) {
        if (event.key === "Escape") {
          event.preventDefault();
          if (hideSpotlightSelection()) {
            return;
          }
          closeImageEditor();
        }
        return;
      }

      if (event.key === "Shift" || event.key === "Meta" || event.key === "Control") {
        state.modifierSelect = true;
      }

      if (event.key === "Enter" && state.editingConnectorId && !isEditable) {
        event.preventDefault();
        endConnectorEdit();
        return;
      }

      const isDeleteKey = event.key === "Delete" || event.key === "Backspace";
      if (!isDeleteKey || isEditable) {
        return;
      }

      if (deleteSelectedConnectorNode()) {
        event.preventDefault();
        return;
      }

      if (state.selectedConnectorId) {
        deleteConnector(state.selectedConnectorId);
        event.preventDefault();
        return;
      }

      if (deleteSelectedImage()) {
        event.preventDefault();
      }
    }

    function handleKeyUp(event) {
      if (event.key === "Shift" || event.key === "Meta" || event.key === "Control") {
        state.modifierSelect = event.shiftKey || event.metaKey || event.ctrlKey;
      }
    }

    function startCanvasMove(event) {
      if (state.canvasDrag || state.imageDrag || state.connectorDrag) {
        return;
      }

      event.preventDefault();
      els.canvas.setPointerCapture(event.pointerId);
      els.shell.classList.add("is-moving");
      state.canvasDrag = {
        type: "move",
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        startLeft: state.x,
        startTop: state.y
      };
    }

    function moveCanvas(event) {
      if (!state.canvasDrag || state.canvasDrag.type !== "move" || event.pointerId !== state.canvasDrag.pointerId) {
        return;
      }

      event.preventDefault();
      const deltaX = event.clientX - state.canvasDrag.startX;
      const deltaY = event.clientY - state.canvasDrag.startY;
      state.x = state.canvasDrag.startLeft + deltaX;
      state.y = state.canvasDrag.startTop + deltaY;
      clampCanvasPosition();
      renderCanvas();
    }

    function endCanvasMove(event) {
      if (!state.canvasDrag || state.canvasDrag.type !== "move" || event.pointerId !== state.canvasDrag.pointerId) {
        return;
      }

      if (els.canvas.hasPointerCapture(event.pointerId)) {
        els.canvas.releasePointerCapture(event.pointerId);
      }
      state.canvasDrag = null;
      els.shell.classList.remove("is-moving");
      renderCanvas();
    }

    function continueCanvasInteraction(event) {
      if (!state.canvasDrag || event.pointerId !== state.canvasDrag.pointerId) {
        return;
      }

      if (state.canvasDrag.type === "move") {
        moveCanvas(event);
      } else {
        moveResize(event);
      }
    }

    function endCanvasInteraction(event) {
      if (!state.canvasDrag || event.pointerId !== state.canvasDrag.pointerId) {
        return;
      }

      if (state.canvasDrag.type === "move") {
        endCanvasMove(event);
      } else {
        endResize(event);
      }
    }

    function handleCanvasPointerDown(event) {
      if (event.button !== 0) {
        return;
      }
      if (state.tool === "connect") {
        handleConnectorSurfacePointerDown(event);
        return;
      }
      if (event.target.closest(".canvas-image, .image-resize-handle, .group-resize-handle")) {
        return;
      }

      clearSelection();
      clearConnectorSelection();
      clearGuides();
    }

    document.querySelectorAll(".resize-handle").forEach((handle) => {
      handle.addEventListener("pointerdown", startResize);
    });

    document.querySelectorAll(".group-resize-handle").forEach((handle) => {
      handle.addEventListener("pointerdown", startGroupResize);
    });

    els.imageInput.addEventListener("change", (event) => {
      uploadImages(event.target.files);
    });
    els.downloadCanvasButton.addEventListener("click", downloadCanvasPng);
    els.copyCanvasButton.addEventListener("click", copyCanvasPng);
    els.selectToolButton.addEventListener("click", () => setTool("select"));
    els.connectToolButton.addEventListener("click", () => setTool("connect"));
    els.backgroundLightButton.addEventListener("click", () => setCanvasBackground("light"));
    els.backgroundDarkButton.addEventListener("click", () => setCanvasBackground("dark"));
    els.canvas.addEventListener("pointerdown", handleCanvasPointerDown);
    els.canvas.addEventListener("contextmenu", (event) => event.preventDefault());
    els.editorClose.addEventListener("click", closeImageEditor);
    els.cropModeButton.addEventListener("click", () => setEditorMode("crop"));
    els.spotlightModeButton.addEventListener("click", () => setEditorMode("spotlight"));
    els.maskRange.addEventListener("input", () => {
      if (!state.editor) {
        return;
      }
      state.editor.mask = Number(els.maskRange.value) / 100;
      els.maskValue.textContent = `${els.maskRange.value}%`;
      renderEditorSelection();
    });
    els.cropRadiusRange.addEventListener("input", () => {
      if (!state.editor) {
        return;
      }
      state.editor.cropRadius = Number(els.cropRadiusRange.value);
      els.cropRadiusValue.textContent = `${els.cropRadiusRange.value}px`;
      renderEditorSelection();
    });
    els.spotlightRadiusRange.addEventListener("input", () => {
      if (!state.editor) {
        return;
      }
      state.editor.spotlightRadius = Number(els.spotlightRadiusRange.value);
      els.spotlightRadiusValue.textContent = `${els.spotlightRadiusRange.value}px`;
      renderEditorSelection();
    });
    els.spotlightZoomRange.addEventListener("input", () => {
      if (!state.editor) {
        return;
      }
      state.editor.spotlightZoom = Number(els.spotlightZoomRange.value) / 100;
      els.spotlightZoomValue.textContent = `${els.spotlightZoomRange.value}%`;
      if (state.editor.spotlightZoom <= 1) {
        state.editor.zoomX = null;
        state.editor.zoomY = null;
        state.editor.zoomMoved = false;
      }
      renderEditorSelection();
    });
    els.resetSelectionButton.addEventListener("click", resetEditorSelection);
    els.applyCropButton.addEventListener("click", applyCrop);
    els.applySpotlightButton.addEventListener("click", applySpotlight);
    els.editorImage.addEventListener("load", renderEditorSelection);
    els.editorStage.addEventListener("dblclick", handleEditorStageDoubleClick);
    els.editorSelection.addEventListener("pointerdown", startEditorSelectionMove);
    els.spotlightZoomLayer.addEventListener("pointerdown", startSpotlightZoomMove);
    els.editorSelection.querySelectorAll(".editor-selection-handle").forEach((handle) => {
      handle.addEventListener("pointerdown", startEditorSelectionResize);
    });

    window.addEventListener("pointermove", continueCanvasInteraction);
    window.addEventListener("pointerup", endCanvasInteraction);
    window.addEventListener("pointercancel", endCanvasInteraction);
    window.addEventListener("pointermove", continueImageInteraction);
    window.addEventListener("pointerup", endImageInteraction);
    window.addEventListener("pointercancel", endImageInteraction);
    window.addEventListener("pointermove", continueConnectorInteraction);
    window.addEventListener("pointerup", endConnectorInteraction);
    window.addEventListener("pointercancel", endConnectorInteraction);
    window.addEventListener("pointermove", continueEditorInteraction);
    window.addEventListener("pointerup", endEditorInteraction);
    window.addEventListener("pointercancel", endEditorInteraction);
    window.addEventListener("keydown", handleKeyDown);
    window.addEventListener("keyup", handleKeyUp);
    window.addEventListener("blur", () => {
      state.modifierSelect = false;
    });
    window.addEventListener("resize", () => {
      renderCanvas();
      renderEditorSelection();
    });
    window.addEventListener("beforeunload", () => {
      getReferencedImageUrls().forEach((url) => {
        if (url.startsWith("blob:")) {
          URL.revokeObjectURL(url);
        }
      });
    });

    window.__canvasGenerator = {
      getState: () => ({
        x: Math.round(state.x),
        y: Math.round(state.y),
        width: Math.round(state.width),
        height: Math.round(state.height),
        imageCount: state.images.length,
        tool: state.tool,
        canvasBackground: state.canvasBackground,
        canvasBackgroundColor: getCanvasBackgroundColor(),
        connectorCount: state.connectors.length,
        connectorNodeCount: state.connectorNodes.length,
        editingConnectorId: state.editingConnectorId,
        selectedConnectorNodeId: state.selectedConnectorNodeId,
        connectorNodes: state.connectorNodes.map((node) => ({
          id: node.id,
          x: Math.round(node.x),
          y: Math.round(node.y),
          selected: node.id === state.selectedConnectorNodeId
        })),
        connectors: state.connectors.map((connector) => {
          const points = getConnectorPoints(connector);
          const start = points[0] || { x: 0, y: 0 };
          const end = points[points.length - 1] || { x: 0, y: 0 };
          return {
            id: connector.id,
            nodeIds: [...connector.nodeIds],
            points: points.map((point) => ({
              x: Math.round(point.x),
              y: Math.round(point.y)
            })),
            start: {
              x: Math.round(start.x),
              y: Math.round(start.y)
            },
            end: {
              x: Math.round(end.x),
              y: Math.round(end.y)
            },
            selected: connector.id === state.selectedConnectorId
          };
        }),
        isConnecting: Boolean(state.connectorDrag || state.editingConnectorId),
        selectedImageIds: getSelectedIds(),
        selectedImageId: state.selectedImageId,
        images: state.images.map((image) => ({
          id: image.id,
          x: Math.round(image.x),
          y: Math.round(image.y),
          width: Math.round(image.width),
          height: Math.round(image.height),
          naturalWidth: Math.round(image.naturalWidth),
          naturalHeight: Math.round(image.naturalHeight),
          aspect: Number(image.aspect.toFixed(4)),
          z: image.z
        })),
        guides: state.activeGuides.map((guide) => ({
          axis: guide.axis,
          value: Math.round(guide.value),
          kind: guide.kind
        })),
        center: {
          x: Math.round(window.innerWidth / 2),
          y: Math.round(window.innerHeight / 2)
        },
        isMovingCanvas: state.canvasDrag?.type === "move",
        isResizing: state.canvasDrag?.type === "resize",
        isEditingImage: Boolean(state.imageDrag),
        editorOpen: Boolean(state.editor),
        editorMode: state.editor?.mode || null,
        editorSelectionVisible: state.editor ? isEditorSelectionVisible() : null,
        editorRadius: state.editor ? getActiveEditorRadius() : null,
        editorCropRadius: state.editor?.cropRadius ?? null,
        editorSpotlightRadius: state.editor?.spotlightRadius ?? null,
        editorSpotlightZoom: state.editor?.spotlightZoom ?? null,
        editorZoom: state.editor && Number.isFinite(state.editor.zoomX) && Number.isFinite(state.editor.zoomY) ? {
          x: Math.round(state.editor.zoomX),
          y: Math.round(state.editor.zoomY),
          moved: Boolean(state.editor.zoomMoved)
        } : null,
        editorSelection: state.editor ? {
          x: Math.round(state.editor.selection.x),
          y: Math.round(state.editor.selection.y),
          width: Math.round(state.editor.selection.width),
          height: Math.round(state.editor.selection.height)
        } : null
      }),
      deleteSelected: deleteSelectedImage
    };

    renderCanvas();
  </script>
</body>
</html>
